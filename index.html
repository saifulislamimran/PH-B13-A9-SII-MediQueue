<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediQueue | Precision Medical Tutoring</title>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-background dark:bg-slate-900 text-on-surface dark:text-gray-100 font-body-md overflow-x-hidden selection:bg-primary/20 selection:text-primary transition-colors duration-300">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; background-color: #f7f9fc;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation: pulse 1.8s infinite ease-in-out;">
          <path d="M4 12H7.5L9.5 6L12.5 18L14.5 10L16.5 12H20" stroke="#24389c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 style="font-weight: 700; font-size: 1.25rem; color: #24389c; margin-top: 1.5rem; letter-spacing: -0.025em;">MediQueue</h2>
        <p style="color: #64748b; font-size: 0.875rem; margin-top: 0.5rem; font-weight: 500;">Loading academic portal...</p>
        <style>
          @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
